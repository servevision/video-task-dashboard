<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Task Dashboard</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --accent: #4d8dff;
    --accent-2: #6ee7b7;
    --danger: #ff6b6b;
    --warn: #ffb020;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

  /* Login screen */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
  }
  #loginScreen h1 { font-size: 28px; margin-bottom: 6px; }
  #loginScreen p { color: var(--text-dim); margin-bottom: 28px; }
  #gsiButtonContainer { margin-top: 8px; }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  header .title { font-size: 20px; font-weight: 600; }
  header .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--panel-2);
    color: var(--accent-2);
    border: 1px solid var(--border);
  }
  header .userinfo { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-dim); }
  header img.avatar { width: 30px; height: 30px; border-radius: 50%; }
  button.logout {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  button.logout:hover { border-color: var(--danger); color: var(--danger); }

  /* Sync status */
  #syncStatus {
    font-size: 12px; color: var(--text-dim); margin-bottom: 16px;
    display: flex; align-items: center; gap: 6px;
  }
  #syncStatus .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-2); }
  #syncStatus.saving .dot { background: var(--warn); }
  #syncStatus.error .dot { background: var(--danger); }

  /* Task form */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
  }
  .card h2 { margin: 0 0 14px; font-size: 16px; }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 5px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input[type=text], textarea, input[type=date], input[type=url], select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
  }
  .btn:hover { opacity: 0.9; }
  .btn.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
  .btn.small { padding: 6px 12px; font-size: 13px; margin-top: 0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Task list */
  .task {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .task-title { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .task-desc { font-size: 13px; color: var(--text-dim); margin: 0 0 10px; white-space: pre-wrap; }
  .meta-row { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
  .status-pill {
    font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap;
  }
  .status-not_started { background: #3a2f1a; color: var(--warn); }
  .status-in_progress { background: #1a2f3a; color: var(--accent); }
  .status-done { background: #1a3a2a; color: var(--accent-2); }

  .task-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .link-box {
    margin-top: 10px; padding: 10px; background: var(--panel-2); border-radius: 8px;
    font-size: 13px; word-break: break-all;
  }
  .link-box a { color: var(--accent); }

  .empty-state { text-align: center; color: var(--text-dim); padding: 40px 20px; font-size: 14px; }

  select.status-select {
    width: auto; padding: 6px 10px; font-size: 13px;
  }

  @media (max-width: 480px) {
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <h1>🎬 Video Task Dashboard</h1>
  <p>Google se sign in karein taaki tasks sync ho sakein</p>
  <div id="gsiButtonContainer"></div>
  <p id="loginError" style="color:#ff6b6b; margin-top:16px; font-size:13px;"></p>
</div>

<div id="app" class="container" style="display:none;">
  <header>
    <div class="title">🎬 Video Task Dashboard <span class="badge" id="roleBadge"></span></div>
    <div class="userinfo">
      <img class="avatar" id="userAvatar" src="" alt="" />
      <span id="userName"></span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="syncStatus"><span class="dot"></span><span id="syncText">Synced with Google Drive</span></div>

  <div id="adminSection" style="display:none;">
    <div class="card">
      <h2>➕ Naya Task Assign Karein</h2>
      <label>Task Title *</label>
      <input type="text" id="taskTitle" placeholder="e.g. Instagram Reel - Product Launch" />

      <label>Description / Instructions</label>
      <textarea id="taskDesc" placeholder="Kya karna hai, footage kaha hai, style reference, etc."></textarea>

      <label>Assign To (Editor's Email)</label>
      <input type="text" id="taskAssignee" placeholder="editor@example.com" />

      <label>Deadline</label>
      <input type="date" id="taskDeadline" />

      <label>Reference Link (optional)</label>
      <input type="url" id="taskRefLink" placeholder="https://drive.google.com/..." />

      <button class="btn" onclick="createTask()">Task Assign Karein</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-filter="all" onclick="setFilter('all')">All</div>
    <div class="tab" data-filter="not_started" onclick="setFilter('not_started')">Not Started</div>
    <div class="tab" data-filter="in_progress" onclick="setFilter('in_progress')">In Progress</div>
    <div class="tab" data-filter="done" onclick="setFilter('done')">Done</div>
  </div>

  <div id="taskList"></div>
</div>

<script>
/* ================= CONFIG ================= */
const CLIENT_ID = "934969728739-6d3t3nta7bdpoeodsmoqbto24l92taol.apps.googleusercontent.com";
const ADMIN_EMAIL = "mohit@servevision.io";
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
const DATA_FILENAME = "video-task-dashboard-data.json";

/* ================= STATE ================= */
let accessToken = null;
let currentUser = null; // { email, name, picture }
let tasks = [];
let dataFileId = null;
let currentFilter = "all";
let tokenClient = null;

/* ================= GOOGLE SIGN-IN (identity) ================= */
window.onload = () => {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse,
  });
  google.accounts.id.renderButton(
    document.getElementById("gsiButtonContainer"),
    { theme: "filled_blue", size: "large", text: "signin_with" }
  );
};

function handleCredentialResponse(response) {
  // Decode JWT to get basic profile info
  const payload = JSON.parse(atob(response.credential.split(".")[1]));
  currentUser = {
    email: payload.email,
    name: payload.name,
    picture: payload.picture,
  };

  // Now request an access token for Drive API access via the OAuth token client
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: async (tokenResponse) => {
      if (tokenResponse.error) {
        document.getElementById("loginError").textContent =
          "Drive access denied. Please allow Drive permission to continue.";
        return;
      }
      accessToken = tokenResponse.access_token;
      await initApp();
    },
  });
  tokenClient.requestAccessToken({ prompt: "" });
}

function logout() {
  google.accounts.id.disableAutoSelect();
  accessToken = null;
  currentUser = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

/* ================= APP INIT ================= */
async function initApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userAvatar").src = currentUser.picture;
  document.getElementById("userName").textContent = currentUser.name;

  const isAdmin = currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  document.getElementById("roleBadge").textContent = isAdmin ? "Admin" : "Editor";
  document.getElementById("adminSection").style.display = isAdmin ? "block" : "none";

  await loadDataFromDrive();
  renderTasks();
}

/* ================= DRIVE STORAGE ================= */
async function findDataFile() {
  const q = encodeURIComponent(`name='${DATA_FILENAME}' and trashed=false`);
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  const data = await res.json();
  if (data.files && data.files.length > 0) {
    return data.files[0].id;
  }
  return null;
}

async function loadDataFromDrive() {
  setSyncStatus("saving", "Loading from Drive...");
  try {
    dataFileId = await findDataFile();
    if (dataFileId) {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${dataFileId}?alt=media`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      const json = await res.json();
      tasks = json.tasks || [];
    } else {
      tasks = [];
      await saveDataToDrive(); // creates the file for the first time
    }
    setSyncStatus("ok", "Synced with Google Drive");
  } catch (err) {
    console.error(err);
    setSyncStatus("error", "Could not load from Drive");
  }
}

async function saveDataToDrive() {
  setSyncStatus("saving", "Saving...");
  const content = JSON.stringify({ tasks }, null, 2);
  const blob = new Blob([content], { type: "application/json" });

  try {
    if (dataFileId) {
      // Update existing file
      await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${dataFileId}?uploadType=media`,
        {
          method: "PATCH",
          headers: {
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json",
          },
          body: content,
        }
      );
    } else {
      // Create new file
      const metadata = { name: DATA_FILENAME, mimeType: "application/json" };
      const form = new FormData();
      form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
      form.append("file", blob);

      const res = await fetch(
        "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",
        {
          method: "POST",
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form,
        }
      );
      const data = await res.json();
      dataFileId = data.id;
    }
    setSyncStatus("ok", "Synced with Google Drive");
  } catch (err) {
    console.error(err);
    setSyncStatus("error", "Save failed — retrying next change");
  }
}

function setSyncStatus(state, text) {
  const el = document.getElementById("syncStatus");
  el.className = state === "ok" ? "" : state;
  document.getElementById("syncText").textContent = text;
}

/* ================= TASK LOGIC ================= */
function createTask() {
  const title = document.getElementById("taskTitle").value.trim();
  const desc = document.getElementById("taskDesc").value.trim();
  const assignee = document.getElementById("taskAssignee").value.trim();
  const deadline = document.getElementById("taskDeadline").value;
  const refLink = document.getElementById("taskRefLink").value.trim();

  if (!title) { alert("Task title zaroori hai"); return; }
  if (!assignee) { alert("Assignee ka email daalein"); return; }

  const task = {
    id: "t_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    title,
    description: desc,
    assignedTo: assignee.toLowerCase(),
    assignedBy: currentUser.email,
    deadline,
    referenceLink: refLink,
    status: "not_started",
    videoLink: "",
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };

  tasks.unshift(task);
  saveDataToDrive();
  renderTasks();

  // reset form
  document.getElementById("taskTitle").value = "";
  document.getElementById("taskDesc").value = "";
  document.getElementById("taskAssignee").value = "";
  document.getElementById("taskDeadline").value = "";
  document.getElementById("taskRefLink").value = "";
}

function updateStatus(taskId, newStatus) {
  const t = tasks.find((x) => x.id === taskId);
  if (!t) return;
  t.status = newStatus;
  t.updatedAt = new Date().toISOString();
  saveDataToDrive();
  renderTasks();
}

function submitVideoLink(taskId) {
  const input = document.getElementById("videoLinkInput_" + taskId);
  const link = input.value.trim();
  if (!link) { alert("Video link daalein"); return; }
  const t = tasks.find((x) => x.id === taskId);
  if (!t) return;
  t.videoLink = link;
  t.status = "done";
  t.updatedAt = new Date().toISOString();
  saveDataToDrive();
  renderTasks();
}

function deleteTask(taskId) {
  if (!confirm("Ye task delete karna hai?")) return;
  tasks = tasks.filter((x) => x.id !== taskId);
  saveDataToDrive();
  renderTasks();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
  document.querySelector(`.tab[data-filter="${f}"]`).classList.add("active");
  renderTasks();
}

/* ================= RENDER ================= */
function statusLabel(s) {
  return { not_started: "Not Started", in_progress: "In Progress", done: "Done" }[s] || s;
}

function renderTasks() {
  const isAdmin = currentUser.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  const list = document.getElementById("taskList");

  let visible = tasks.filter((t) => {
    if (!isAdmin && t.assignedTo !== currentUser.email.toLowerCase()) return false;
    if (currentFilter !== "all" && t.status !== currentFilter) return false;
    return true;
  });

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty-state">Koi task nahi mila.</div>`;
    return;
  }

  list.innerHTML = visible
    .map((t) => {
      const canEdit = !isAdmin && t.assignedTo === currentUser.email.toLowerCase();
      return `
        <div class="task">
          <div class="task-top">
            <div>
              <p class="task-title">${escapeHtml(t.title)}</p>
              <p class="task-desc">${escapeHtml(t.description || "")}</p>
            </div>
            <span class="status-pill status-${t.status}">${statusLabel(t.status)}</span>
          </div>
          <div class="meta-row">
            <span>👤 Assigned to: ${escapeHtml(t.assignedTo)}</span>
            ${t.deadline ? `<span>📅 Deadline: ${escapeHtml(t.deadline)}</span>` : ""}
            ${t.referenceLink ? `<span>🔗 <a href="${escapeAttr(t.referenceLink)}" target="_blank" style="color:var(--accent)">Reference</a></span>` : ""}
          </div>

          ${canEdit && t.status !== "done" ? `
            <div class="task-actions">
              ${t.status === "not_started" ? `<button class="btn small" onclick="updateStatus('${t.id}','in_progress')">Start Working</button>` : ""}
              ${t.status === "in_progress" ? `
                <input type="url" id="videoLinkInput_${t.id}" placeholder="Video ka link paste karein" style="flex:1; min-width:180px;" />
                <button class="btn small" onclick="submitVideoLink('${t.id}')">Mark Done + Submit Link</button>
              ` : ""}
            </div>
          ` : ""}

          ${t.status === "done" && t.videoLink ? `
            <div class="link-box">✅ Video: <a href="${escapeAttr(t.videoLink)}" target="_blank">${escapeHtml(t.videoLink)}</a></div>
          ` : ""}

          ${isAdmin ? `
            <div class="task-actions">
              <button class="btn small secondary" onclick="deleteTask('${t.id}')">Delete</button>
            </div>
          ` : ""}
        </div>
      `;
    })
    .join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}
function escapeAttr(str) {
  return (str || "").replace(/"/g, "&quot;");
}
</script>
</body>
</html>
